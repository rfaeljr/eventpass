# ══════════════════════════════════════════════════════════════
#  Nginx — EventPass Web
#  - Serve o build estático React (SPA com fallback para index.html)
#  - Proxy reverso: /api → Spring Boot (eventpass-app:8080)
#  - Proxy reverso: /ws  → WebSocket do Spring Boot
# ══════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name _;

    # Pasta onde o build do Vite foi copiado
    root /usr/share/nginx/html;
    index index.html;

    # ── Compressão ─────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_min_length 1024;

    # ── Cache de assets estáticos ──────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Health check (usado pelo Docker healthcheck) ───────────
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── Proxy REST API → Spring Boot ───────────────────────────
    location /api/ {
        proxy_pass         http://eventpass-app:8080/api/;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts generosos para uploads de planilha e relatórios PDF
        proxy_connect_timeout  60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        # Buffer — evita "upstream sent invalid header"
        proxy_buffering        on;
        proxy_buffer_size      16k;
        proxy_buffers          4 32k;
    }

    # ── Proxy WebSocket → Spring Boot (dashboard ao vivo) ──────
    location /ws {
        proxy_pass          http://eventpass-app:8080/ws;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_read_timeout  3600s;
    }

    # ── SPA fallback — DEVE ser a última location ──────────────
    # Qualquer rota que não seja arquivo/api vai para o index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}